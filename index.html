<!DOCTYPE html>
<html>

<head>

    <title>CyberShield AI</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 800px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
        }

        .progress {
            width: 100%;
            height: 25px;
            background: #ddd;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: red;
            color: white;
            text-align: center;
            line-height: 25px;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>🛡 CyberShield AI</h1>

        <textarea id="msg" rows="6" placeholder="Paste suspicious message or URL here">
</textarea>

        <button onclick="checkMessage()">
            Check Message
        </button>

        <div id="result"></div>
        <div class="progress">
            <div class="progress-bar" id="riskBar">
                0%
            </div>
        </div>

    </div>

    <script>

        async function checkMessage() {

            let text = document.getElementById("msg").value;

            let response = await fetch(
                "http://127.0.0.1:5000/check",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: text
                    })
                }
            );

            let data = await response.json();

            let resultBox =
                document.getElementById("result");

            if (data.result === "Potential Phishing") {
                resultBox.style.color = "red";
            }
            else {
                resultBox.style.color = "green";
            }

            resultBox.innerHTML = `
<h3>${data.result}</h3>
<p><strong>Risk Score:</strong> ${data.risk_score}</p>
<p><strong>Risk Percentage:</strong> ${data.risk_percent}%</p>
<p><strong>Detected Words:</strong> ${data.detected_words.join(", ")}</p>
<p><strong>Domain Age:</strong> ${data.domain_age}</p>
<p><b>Registrar:</b> ${data.registrar}</p>
<p><b>Country:</b> ${data.country}</p>

<p><b>Why flagged:</b></p>
<ul>
${data.explanation.map(reason => `<li>${reason}</li>`).join("")}
</ul>
`;

            let riskBar = document.getElementById("riskBar");

            riskBar.style.width = data.risk_percent + "%";
            riskBar.innerHTML = data.risk_percent + "%";

            if (data.risk_percent < 30) {
                riskBar.style.background = "green";
            }
            else if (data.risk_percent < 70) {
                riskBar.style.background = "orange";
            }
            else {
                riskBar.style.background = "red";
            }
        }


    </script>

</body>

</html>
